<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="900" height="380" fill="#FFFDF8"/>

  <!-- Fixed-size chunking -->
  <text x="40" y="40" font-size="16" font-weight="700" fill="#0F172A">Fixed-size chunking</text>
  <rect x="40" y="60" width="380" height="220" rx="14" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
  <g font-size="12" fill="#334155">
    <text x="60" y="90">"...the retriever fetches the top-k</text>
    <text x="60" y="108">passages, reranks them by cross-</text>
    <text x="60" y="126">encoder score, and passes the</text>
    <rect x="46" y="132" width="368" height="2" fill="#F59E0B"/>
    <text x="60" y="150">top 3 to the</text>
    <text x="60" y="168" font-weight="700" fill="#DC2626">| context window. A poorly</text>
    <text x="60" y="186">chunked passage can split a</text>
    <text x="60" y="204">sentence in half, forcing the</text>
    <text x="60" y="222">model to guess at missing..."</text>
  </g>
  <text x="230" y="255" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="600">✕ cuts mid-sentence</text>
  <text x="230" y="272" text-anchor="middle" font-size="12" fill="#64748B">every chunk, same size</text>

  <!-- Semantic chunking -->
  <text x="480" y="40" font-size="16" font-weight="700" fill="#0F172A">Semantic chunking</text>
  <rect x="480" y="60" width="380" height="220" rx="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <g font-size="12" fill="#334155">
    <text x="500" y="90">"...the retriever fetches the top-k</text>
    <text x="500" y="108">passages, reranks them by cross-</text>
    <text x="500" y="126">encoder score, and passes the</text>
    <text x="500" y="144">top 3 to the context window."</text>
    <rect x="486" y="152" width="368" height="2" fill="#22C55E"/>
    <text x="500" y="176">"A poorly chunked passage can</text>
    <text x="500" y="194">split a sentence in half, forcing</text>
    <text x="500" y="212">the model to guess at missing</text>
    <text x="500" y="230">context."</text>
  </g>
  <text x="670" y="255" text-anchor="middle" font-size="12" fill="#22C55E" font-weight="600">✓ breaks on natural boundaries</text>
  <text x="670" y="272" text-anchor="middle" font-size="12" fill="#64748B">variable size, whole ideas kept together</text>

  <text x="40" y="330" font-size="13" fill="#475569">Fixed-size is simpler and cheaper to run at scale. Semantic chunking costs more compute per</text>
  <text x="40" y="350" font-size="13" fill="#475569">document but measurably reduces "half an idea" retrieval failures in evaluation.</text>
</svg>
