<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1000" height="460" fill="#FFFDF8"/>

  <text x="40" y="46" font-size="15" font-weight="700" fill="#2563EB" letter-spacing="1">INGESTION</text>
  <g font-size="14" font-weight="600" fill="#0F172A">
    <rect x="40" y="64" width="150" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="115" y="99" text-anchor="middle">Documents</text>

    <rect x="240" y="64" width="150" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="315" y="99" text-anchor="middle">Chunking</text>

    <rect x="440" y="64" width="170" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="525" y="99" text-anchor="middle">Embedding Model</text>

    <rect x="660" y="64" width="160" height="60" rx="12" fill="#EFF4FE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="740" y="99" text-anchor="middle" fill="#1E40AF">Vector Store</text>
  </g>

  <g stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M190 94 H240"/>
    <path d="M390 94 H440"/>
    <path d="M610 94 H660"/>
  </g>

  <text x="40" y="200" font-size="15" font-weight="700" fill="#2563EB" letter-spacing="1">QUERY TIME</text>
  <g font-size="14" font-weight="600" fill="#0F172A">
    <rect x="40" y="218" width="150" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="115" y="253" text-anchor="middle">User Query</text>

    <rect x="240" y="218" width="170" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="325" y="253" text-anchor="middle">Embedding Model</text>

    <rect x="460" y="218" width="150" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="535" y="245" text-anchor="middle">Hybrid</text>
    <text x="535" y="263" text-anchor="middle">Retriever</text>

    <rect x="660" y="218" width="150" height="60" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="735" y="245" text-anchor="middle">Cross-encoder</text>
    <text x="735" y="263" text-anchor="middle">Reranker</text>
  </g>

  <g stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M190 248 H240"/>
    <path d="M410 248 H460"/>
    <path d="M610 248 H660"/>
    <path d="M740 124 V218" stroke-dasharray="4 4"/>
  </g>

  <g font-size="14" font-weight="600">
    <rect x="810" y="141" width="150" height="60" rx="12" fill="#0F172A"/>
    <text x="885" y="176" text-anchor="middle" fill="#F8FAFC">LLM</text>

    <rect x="810" y="218" width="150" height="60" rx="12" fill="#EFF4FE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="885" y="253" text-anchor="middle" fill="#1E40AF">Answer</text>
  </g>

  <g stroke="#94A3B8" stroke-width="2" fill="none">
    <path d="M810 248 H865 V171" marker-end="url(#arrow)"/>
    <path d="M885 201 V218" marker-end="url(#arrow)"/>
  </g>

  <line x1="0" y1="340" x2="1000" y2="340" stroke="#E8E4DA"/>
  <text x="40" y="380" font-size="14" fill="#475569">Ingestion runs once (or on a schedule) per document set.</text>
  <text x="40" y="404" font-size="14" fill="#475569">Query time runs on every request — this is the path that determines user-facing latency.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
