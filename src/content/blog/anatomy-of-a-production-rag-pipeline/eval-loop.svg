<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="900" height="420" fill="#FFFDF8"/>

  <g font-size="14" font-weight="600" fill="#0F172A">
    <rect x="60" y="40" width="190" height="64" rx="12" fill="#EFF4FE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="155" y="66" text-anchor="middle" fill="#1E40AF">Retrieval eval</text>
    <text x="155" y="86" text-anchor="middle" font-size="12" font-weight="400" fill="#475569">recall@k, MRR</text>

    <rect x="650" y="40" width="190" height="64" rx="12" fill="#EFF4FE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="745" y="66" text-anchor="middle" fill="#1E40AF">Generation eval</text>
    <text x="745" y="86" text-anchor="middle" font-size="12" font-weight="400" fill="#475569">faithfulness, relevance</text>

    <rect x="650" y="300" width="190" height="64" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="745" y="326" text-anchor="middle">Human review</text>
    <text x="745" y="346" text-anchor="middle" font-size="12" font-weight="400" fill="#475569">sampled failure cases</text>

    <rect x="60" y="300" width="190" height="64" rx="12" fill="#FFFFFF" stroke="#E8E4DA" stroke-width="1.5"/>
    <text x="155" y="326" text-anchor="middle">Tune &amp; redeploy</text>
    <text x="155" y="346" text-anchor="middle" font-size="12" font-weight="400" fill="#475569">chunking, prompt, top-k</text>
  </g>

  <g stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow2)">
    <path d="M250 72 H650"/>
    <path d="M745 104 V300"/>
    <path d="M650 332 H250"/>
    <path d="M155 300 V104"/>
  </g>

  <text x="450" y="210" text-anchor="middle" font-size="13" fill="#94A3B8" font-style="italic">a continuous loop, not a one-time launch step</text>

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
